name: Startup-Deals wöchentlich aktualisieren

on:
  schedule:
    - cron: "0 7 * * 2"   # Dienstags 7 Uhr UTC (1 Tag nach Förderprogrammen)
  workflow_dispatch:        # Manuell auslösbar via GitHub UI

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # Für git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install httpx anthropic pillow

      # ── Scraping ──────────────────────────────────────────────────────
      - name: Curated Deal-Seiten scrapen
        run: python3 scrapers/deals_curated.py
        continue-on-error: true

      - name: Discovery-Aggregatoren scrapen
        run: python3 scrapers/deals_discovery.py
        continue-on-error: true

      # ── Normalisierung ────────────────────────────────────────────────
      - name: Mit Claude normalisieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/normalize_deals.py

      # ── Build public/deals.json ───────────────────────────────────────
      - name: public/deals.json bauen
        run: python3 scripts/build_deals_json.py

      # ── Logos & Banner nachziehen (nur neue — vorhandene bleiben) ─────
      - name: Logos & Banner scrapen
        run: python3 scripts/fetch_logos.py
        continue-on-error: true

      # ── Qualitäts-Check ───────────────────────────────────────────────
      - name: Qualitäts-Check
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          p = Path("public/deals.json")
          if not p.exists():
              print("✗ public/deals.json nicht gefunden!")
              exit(1)

          data = json.loads(p.read_text())
          deals = data["deals"]
          stats = data["stats"]

          print(f"✓ {stats['total_deals']} Deals in {stats['categories']} Kategorien")
          print(f"  Gesamtwert (geschätzt): {stats['total_value_approx']}")
          print(f"  Letzte Aktualisierung:  {stats['last_updated']}")

          # Warnen bei zu wenig Deals
          if len(deals) < 10:
              print("⚠  Weniger als 10 Deals – Pipeline prüfen!")
              exit(1)

          # Pflichtfelder prüfen
          missing = [d["id"] for d in deals if not d.get("desc") or not d.get("url")]
          if missing:
              print(f"⚠  Fehlende Pflichtfelder: {missing[:5]}")

          print("✓ Qualitäts-Check bestanden")
          EOF

      # ── Commit & Push ─────────────────────────────────────────────────
      - name: Änderungen committen
        run: |
          git config user.name "matchfoundr-bot"
          git config user.email "bot@matchfoundr.de"
          git add public/deals.json public/logos/ public/banners/ data/deals/
          git diff --staged --quiet || git commit -m "data: Startup-Deals $(date +%Y-%m-%d) aktualisiert"
          git push

      # ── GitHub Issue bei Fehler ────────────────────────────────────────
      - name: Issue bei Pipeline-Fehler anlegen
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deals-Pipeline fehlgeschlagen (${new Date().toISOString().split('T')[0]})`,
              body: `Die wöchentliche Deals-Aktualisierung ist fehlgeschlagen.\n\n**Workflow:** ${context.workflow}\n**Run:** ${context.runId}\n\n[Logs ansehen](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'Infra'],
            });
