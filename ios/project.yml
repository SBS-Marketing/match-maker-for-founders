# matchfoundr iOS — xcodegen Projektdefinition
# `xcodegen generate` erzeugt Matchfoundr.xcodeproj (nicht einchecken).
name: Matchfoundr
options:
  bundleIdPrefix: de.matchfoundr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Light
    INFOPLIST_KEY_CFBundleDisplayName: matchfoundr
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
targets:
  Matchfoundr:
    type: application
    platform: iOS
    sources:
      - Matchfoundr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.matchfoundr.app
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
