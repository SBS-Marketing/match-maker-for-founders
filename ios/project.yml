# matchfoundr iOS — xcodegen Projektdefinition
# `xcodegen generate` erzeugt Matchfoundr.xcodeproj (nicht einchecken).
name: Matchfoundr
options:
  bundleIdPrefix: de.matchfoundr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  Matchfoundr:
    type: application
    platform: iOS
    sources:
      - Matchfoundr
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Matchfoundr/Info.plist
      properties:
        CFBundleDisplayName: matchfoundr
        CFBundleURLTypes:
          - CFBundleURLName: de.matchfoundr.app
            CFBundleURLSchemes:
              - matchfoundr
        UILaunchScreen: {}
        UIUserInterfaceStyle: Light
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.matchfoundr.app
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: NNUJQM4NF9
